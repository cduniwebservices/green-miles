name: Flutter CI/CD

on:
  push:
    branches: [master]

jobs:
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gen.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Generate Version Number
        id: gen
        run: |
          chmod +x .github/scripts/generate_version.sh
          ./.github/scripts/generate_version.sh

  build-android:
    name: Build Android APK
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} --dart-define=APP_VERSION=${{ env.VERSION }}

      - name: Rename APK with Version
        run: |
          mkdir -p build/app/outputs/flutter-apk/renamed
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/renamed/android-app-${{ env.VERSION }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app-${{ env.VERSION }}
          path: build/app/outputs/flutter-apk/renamed/android-app-${{ env.VERSION }}.apk

  build-ios:
    name: Build iOS App
    needs: [version, build-android]
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} --dart-define=APP_VERSION=${{ env.VERSION }}

      - name: Rename iOS App with Version
        run: |
          cd build/ios/iphoneos
          # Find the .app directory (should be Runner.app or similar)
          APP_DIR=$(basename $(find . -maxdepth 1 -name "*.app" -type d | head -1))
          if [ -n "$APP_DIR" ]; then
            mv "$APP_DIR" "ios-app-${{ env.VERSION }}.app"
          fi

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ env.VERSION }}.app
          path: build/ios/iphoneos/ios-app-${{ env.VERSION }}.app
