name: calories_not_carbon
description: "GPS Carbon Offset Tracking App"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^12.1.3
  
  # Animations
  flutter_animate: ^4.5.0
  
  # UI & Fonts
  google_fonts: ^6.3.0
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  permission_handler: ^11.2.0
  
  # Charts & Data Visualization
  fl_chart: ^0.68.0
  
  # Storage & Data
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

  # Offline-first local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity detection for sync
  connectivity_plus: ^6.0.0

  # Cloud sync
  supabase_flutter: ^2.0.0

  # Crash reporting & monitoring
  sentry_flutter: ^9.0.0

  # SVG rendering
  flutter_svg: ^2.0.0

  # Hardware Access
  sensors_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
